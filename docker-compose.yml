services:
  sonarqube:
    image: sonarqube:latest
    container_name: chapchap-sonarqube
    restart: always
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - "9000:9000"
    volumes:
      - chapchap_sonarqube_data:/opt/sonarqube/data
      - chapchap_sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  chapchap_sonarqube_data: {}
  chapchap_sonarqube_extensions: {}