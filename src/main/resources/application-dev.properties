
# Configuration de la source de donnees (MySQL)
spring.datasource.url=jdbc:mysql://localhost:8889/ChapChap?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Dossier d'upload (chemin relatif au repertoire d'execution)
app.upload.dir=uploads/preuves/

# Upload de fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Minimise les infos Spring Boot
spring.main.log-startup-info=false
spring.main.banner-mode=console

server.servlet.session.persistent=false