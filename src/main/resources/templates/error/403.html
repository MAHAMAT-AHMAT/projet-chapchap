<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Accès refusé — ChapChap</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}"/>
    <style>
        body { background:#f4f6fb; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh;
               display:flex; align-items:center; justify-content:center; }
        .error-card { background:#fff; border-radius:1rem; padding:3rem 2.5rem; text-align:center;
                      max-width:480px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
        .error-code { font-size:5rem; font-weight:800; color:#dc3545; line-height:1; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-code">403</div>
    <i class="bi bi-shield-lock fs-1 text-danger mt-2 d-block"></i>
    <h2 class="mt-3 fw-semibold">Accès refusé</h2>
    <p class="text-muted mb-4">
        Vous n'avez pas les permissions nécessaires pour accéder à cette ressource.
    </p>
    <a href="/transactions/dashboard" class="btn btn-primary">
        <i class="bi bi-house me-1"></i> Retour au dashboard
    </a>
</div>
</body>
</html>
