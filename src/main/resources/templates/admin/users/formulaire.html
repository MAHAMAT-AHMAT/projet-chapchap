<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content},
          ${modeEdition ? 'Modifier l''utilisateur' : 'Nouvel utilisateur'},
          ${modeEdition ? 'Édition du compte' : 'Création d''un compte'})}">
<head><title>Utilisateur</title></head>
<body>

<th:block th:fragment="main-content">

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-gear me-2"></i>
                <span th:text="${modeEdition ? 'Modifier l''utilisateur' : 'Nouvel utilisateur'}">Formulaire</span>
            </div>
            <div class="card-body p-4">

                <form th:action="${modeEdition ? '/admin/users/' + userDTO.id + '/modifier' : '/admin/users/nouveau'}"
                      th:object="${userDTO}"
                      method="post"
                      novalidate>

                    <div class="row g-3">

                        <!-- ── IDENTIFIANT ── -->
                        <div class="col-12">
                            <label class="form-label" for="username">
                                Identifiant <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="username" th:field="*{username}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                   placeholder="ex: jean.dupont"/>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}">Erreur</div>
                        </div>

                        <!-- ── EMAIL ── -->
                        <div class="col-12">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" id="email" th:field="*{email}"
                                   class="form-control"
                                   placeholder="ex: jean@example.com"/>
                        </div>

                        <!-- ── MOT DE PASSE ── -->
                        <div class="col-12">
                            <label class="form-label" for="password">
                                Mot de passe
                                <small class="text-muted fw-normal"
                                       th:if="${modeEdition}">(laisser vide pour ne pas modifier)</small>
                                <span class="text-danger" th:if="${!modeEdition}">*</span>
                            </label>
                            <input type="password" id="password" th:field="*{password}"
                                   class="form-control"
                                   placeholder="••••••••"
                                   th:required="${!modeEdition}"/>
                        </div>

                        <!-- ── RÔLE ── -->
                        <div class="col-md-6">
                            <label class="form-label" for="role">
                                Rôle <span class="text-danger">*</span>
                            </label>
                            <select id="role" th:field="*{role}" class="form-select"
                                    th:classappend="${#fields.hasErrors('role')} ? 'is-invalid' : ''"
                                    onchange="togglePaysField()">
                                <option value="">-- Choisir --</option>
                                <option th:each="r : ${roles}"
                                        th:value="${r.name()}"
                                        th:text="${r.name() == 'ADMIN' ? 'Administrateur' : (r.name() == 'MANAGER' ? 'Manager' : 'Utilisateur')}"></option>
                            </select>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('role')}"
                                 th:errors="*{role}">Erreur</div>
                        </div>

                        <!-- ── PAYS (obligatoire si USER) ── -->
                        <div class="col-md-6" id="paysField">
                            <label class="form-label" for="pays">
                                Pays <span class="text-danger" id="paysRequired">*</span>
                            </label>
                            <select id="pays" th:field="*{pays}" class="form-select"
                                    th:classappend="${#fields.hasErrors('pays')} ? 'is-invalid' : ''">
                                <option value="">-- Choisir --</option>
                                <option th:each="p : ${listePays}"
                                        th:value="${p.name()}"
                                        th:text="${p.libelle}"></option>
                            </select>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('pays')}"
                                 th:errors="*{pays}">Erreur</div>
                            <small class="text-muted">Obligatoire pour le rôle Utilisateur</small>
                        </div>

                        <!-- ── STATUT ── -->
                        <div class="col-12 d-flex align-items-end pb-1">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox"
                                       id="enabled" th:field="*{enabled}" role="switch"/>
                                <label class="form-check-label" for="enabled">Compte actif</label>
                            </div>
                        </div>

                    </div>

                    <div class="d-flex gap-2 mt-4 pt-3 border-top">
                        <button type="submit" class="btn btn-primary-custom">
                            <i class="bi bi-floppy me-1"></i>
                            <span th:text="${modeEdition ? 'Enregistrer les modifications' : 'Créer l''utilisateur'}">
                                Enregistrer
                            </span>
                        </button>
                        <a th:href="@{/admin/users}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Annuler
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
function togglePaysField() {
    var role = document.getElementById('role').value;
    var paysReq = document.getElementById('paysRequired');
    if (paysReq) {
        paysReq.style.display = (role === 'USER') ? '' : 'none';
    }
}
document.addEventListener('DOMContentLoaded', togglePaysField);
</script>

</th:block>
</body>
</html>
